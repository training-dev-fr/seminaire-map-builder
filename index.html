<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="menu">
        <div class="size">
            <div class="form-group">
                <label for="width">Largeur</label>
                <input type="text" name="width" id="width" value="10">
            </div>
            <div class="form-group">
                <label for="height">Hauteur</label>
                <input type="text" name="height" id="height" value="10">
            </div>
            <div class="form-group">
                <button id="change-size">Appliquer</button>
            </div>
        </div>
        <p>Textures</p>
        <div class="form-group">
            <label for="tile-width">Taille X (px)</label>
            <input type="number" name="tile-width" id="tile-width" value="16" style="width: 50px;">
            <label for="tile-height">Taille Y (px)</label>
            <input type="number" name="tile-height" id="tile-height" value="16" style="width: 50px;">
        </div>
        <div class="form-group">
            <button id="import-tileset">Importer Tileset</button>
            <input id="import-tileset-file" type="file" accept="image/*" hidden>
        </div>
        <div class="tuile">

        </div>
        <p>Outils</p>
        <div class="tools">
            <button class="active" data-id="pen">
                <i class="fa-solid fa-pen" title="case" ></i>
            </button>
            <button data-id="fill">
                <i class="fa-solid fa-fill" title="remplir" ></i>
            </button>
            <button data-id="erase">
                <i class="fa-solid fa-eraser" title="effacer" ></i>
            </button>
        </div>
        <p>Rotation tuile</p>
        <div class="tools">
            <button data-id="rotate">
                <i class="fa-solid fa-rotate-right" title="pivoter de 90 degres" ></i>
            </button>
        </div>
        <div class="form-group">
            <button id="export-json">Exporter JSON</button>
        </div>
        <div class="form-group">
            <button id="export-image">Exporter PNG</button>
        </div>
        <div class="form-group">
            <button id="import-json">Importer JSON</button>
            <input id="import-json-file" type="file" accept=".json,application/json" hidden>
        </div>
    </div>
    <div class="canvas">
        <canvas width="800" height="800"></canvas>
    </div>
    <script src="src/index.js" type="module"></script>
</body>

</html>
